services:
  - type: web
    name: pollish-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        fromService:
          type: web
          name: pollish-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: pollish-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: pollish-backend
          envVarKey: RENDER_EXTERNAL_URL
